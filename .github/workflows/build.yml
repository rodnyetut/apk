name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix activity_main.xml
        run: |
          rm -f app/src/main/res/layout/activity_main.xml
          mkdir -p app/src/main/res/layout
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/layout/activity_main.xml
          printf '%s\n' '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"' >> app/src/main/res/layout/activity_main.xml
          printf '%s\n' '    android:layout_width="match_parent"' >> app/src/main/res/layout/activity_main.xml
          printf '%s\n' '    android:layout_height="match_parent">' >> app/src/main/res/layout/activity_main.xml
          printf '%s\n' '    <WebView' >> app/src/main/res/layout/activity_main.xml
          printf '%s\n' '        android:id="@+id/webView"' >> app/src/main/res/layout/activity_main.xml
          printf '%s\n' '        android:layout_width="match_parent"' >> app/src/main/res/layout/activity_main.xml
          printf '%s\n' '        android:layout_height="match_parent" />' >> app/src/main/res/layout/activity_main.xml
          printf '%s\n' '</LinearLayout>' >> app/src/main/res/layout/activity_main.xml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
